<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon Mimi ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* Canvas behind everything */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Main content */
.main {
    position: relative;
    z-index: 2;
    padding: 15px;
}

/* Glowing Mimi */
h1 {
    font-size: 2.5em;
    animation: glow 3s infinite;
}

@keyframes glow {
    0% { color: #ff4da6; text-shadow: 0 0 10px #ff4da6; }
    50% { color: #ff99cc; text-shadow: 0 0 20px #ff99cc; }
    100% { color: #ff4da6; text-shadow: 0 0 10px #ff4da6; }
}

/* Typing text */
#typing {
    font-size: 18px;
    min-height: 50px;
}

/* Buttons */
.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    margin: 10px;
    cursor: pointer;
}

.yes { background: #ff4da6; color: white; }
.no {
    background: white;
    color: #ff4da6;
    position: absolute;
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 42%;
    max-width: 180px;
    margin: 8px;
    border-radius: 15px;
}

/* Message */
.message { display: none; }

/* Hearts */
.heart {
    position: fixed;
    animation: float 4s linear;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Roses */
.rose {
    position: fixed;
    top: -20px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="main">

<h1>Get Well Soon Mimi ❤️</h1>

<p id="typing"></p>

<h3>Will you get well soon for me? 🥺</h3>

<button class="btn yes" onclick="showLove()">YES 💖</button>
<button class="btn no" id="noBtn">NO 😢</button>

<div class="message" id="msg">
    <h2>YAYYY 😍💖</h2>
    <p>You are strong, beautiful, and unstoppable 💕</p>
</div>

<h3>Our Memories 📸</h3>

<div class="gallery">
    <img src="18.png">
    <img src="22.png">
    <img src="25.png">
    <img src="27.png">
</div>

<button class="btn" onclick="sadMsg()">Click when sad 💌</button>
<p id="sadText"></p>

</div>

<script>
/* Typing Effect */
const text = "Mimi… 💖 I miss your smile so much 😊 Please get well soon… I’m always with you ❤️";
let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

/* YES CLICK */
function showLove() {
    document.getElementById("msg").style.display = "block";
    createHearts();
    startFireworks();
    startRoses();
}

/* NO BUTTON MOVE */
let noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", move);
noBtn.addEventListener("touchstart", move);

function move() {
    noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    noBtn.style.left = Math.random() * (window.innerWidth - 50) + "px";
}

/* HEARTS */
function createHearts() {
    for (let i = 0; i < 20; i++) {
        let h = document.createElement("div");
        h.innerHTML = "❤️";
        h.className = "heart";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }
}

/* ROSES */
function startRoses() {
    setInterval(() => {
        let r = document.createElement("div");
        r.innerHTML = "🌹";
        r.className = "rose";
        r.style.left = Math.random() * 100 + "vw";
        r.style.fontSize = (Math.random()*20+15)+"px";
        r.style.animationDuration = (Math.random()*3+3)+"s";
        document.body.appendChild(r);
        setTimeout(()=>r.remove(),6000);
    },300);
}

/* SAD MESSAGES */
const msgs = [
"Everything will be okay 💖",
"I’m always with you ❤️",
"You are strong 💪",
"Your smile will return 😊"
];

function sadMsg() {
    let m = msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById("sadText").innerText = m;
}

/* FIREWORKS REAL BURST */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

function startFireworks() {
    setInterval(() => {
        let x = Math.random()*canvas.width;
        let y = Math.random()*canvas.height/2;

        for (let i=0;i<40;i++){
            particles.push({
                x:x,
                y:y,
                dx:(Math.random()-0.5)*6,
                dy:(Math.random()-0.5)*6,
                life:80
            });
        }
    },700);
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
        ctx.fill();

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
